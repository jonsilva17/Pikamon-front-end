<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikamon - O Meu Histórico</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 40px; text-align: center; color: #333; }
        .container { max-width: 700px; margin: 0 auto; text-align: left; }
        .voltar { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; font-weight: bold; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid #007bff; }
        .data { font-size: 12px; color: #888; margin-bottom: 8px; }
        .poke-item { background: #f8f9fa; padding: 8px 12px; margin: 5px 0; border-radius: 6px; font-size: 15px; }
        .poke-name { font-weight: bold; color: #111; }
        .poke-reason { font-style: italic; color: #555; font-size: 14px; }
        .sync-btn { display: inline-block; padding: 8px 16px; background-color: #ffc107; color: #333; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-bottom: 20px; transition: background 0.2s; }
        .sync-btn:hover { background-color: #e0a800; }
        .sync-msg { font-size: 13px; color: #666; margin-top: 5px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="voltar">← Voltar ao Gerador</a>
        <h1 id="titulo">As Minhas Equipas Guardadas</h1>
        <div id="syncArea" style="display:none;">
            <button id="syncBtn" class="sync-btn">⬆ Sincronizar equipas locais com o servidor</button>
            <div id="syncMsg" class="sync-msg"></div>
        </div>
        <div id="listaEquipas">A carregar o teu histórico...</div>
    </div>

    <script>
        const API_URL = "https://pikamon-ai.onrender.com";
        const user = localStorage.getItem("utilizadorLogado");
        const token = localStorage.getItem("token"); 

        if (!user) {
            document.getElementById("listaEquipas").innerHTML = `<p style="color:red; font-weight:bold;">Precisas de fazer login para ver o teu histórico!</p><a href="login.html">Ir para a página de Login</a>`;
        } else {
            document.getElementById("titulo").innerText = `Equipas de ${user} 💾`;

            // 🛡️ CORRIGIDO: Rota alterada de /historico/${user} para apenas /historico
            fetch(`${API_URL}/historico`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": token ? `Bearer ${token}` : ""
                }
            })
            .then(res => {
                if (!res.ok) throw new Error("Erro na resposta do servidor");
                return res.json();
            })
            .then(data => {
                renderizarHistoricoCompleto(data.historico || []);
            })
            .catch(err => {
                console.error("Erro ao ligar ao servidor, a usar histórico local:", err);
                renderizarHistoricoCompleto([]);
            });
        }

        function renderizarHistoricoCompleto(historicoServidor) {
            const container = document.getElementById("listaEquipas");
            container.innerHTML = "";

            let historicoLocal = JSON.parse(localStorage.getItem("historicoEquipas")) || [];
            let listaFinal = [...historicoServidor];
            
            historicoLocal.forEach(localItem => {
                listaFinal.push({
                    data: localItem.data || new Date(),
                    equipa: JSON.stringify({ oponentes: localItem.oponentes, counters: localItem.counters })
                });
            });

            if (listaFinal.length === 0) {
                container.innerHTML = "<p>Ainda não guardaste nenhuma equipa automática. Vai à página principal e gera uma!</p>";
                return;
            }

            listaFinal.forEach(item => {
                try {
                    const dadosEquipa = typeof item.equipa === 'string' ? JSON.parse(item.equipa) : item.equipa;
                    
                    let dataFormatada;
                    try {
                        dataFormatada = new Date(item.data).toLocaleString("pt-PT");
                        if (dataFormatada.includes("Invalid")) throw new Error();
                    } catch {
                        dataFormatada = item.data; 
                    }

                    const card = document.createElement("div");
                    card.className = "card";
                    
                    let htmlContent = `<div class="data">📅 Gerada em: ${dataFormatada}</div>`;
                    
                    let listaPokemons = [];
                    if (dadosEquipa.oponentes && dadosEquipa.counters) {
                        htmlContent += `<div style="margin-bottom: 12px; font-weight: bold; color: #e63946;">⚔️ Contra: <span style="color: #333;">${dadosEquipa.oponentes}</span></div>`;
                        listaPokemons = dadosEquipa.counters.suggested_team || dadosEquipa.counters;
                    } else {
                        listaPokemons = dadosEquipa.suggested_team || dadosEquipa;
                    }

                    if (Array.isArray(listaPokemons)) {
                        listaPokemons.forEach(p => {
                            htmlContent += `
                                <div class="poke-item">
                                    <span class="poke-name">⚫ ${p.pokemon}</span>: 
                                    <span class="poke-reason">${p.reason}</span>
                                </div>`;
                        });
                    }

                    card.innerHTML = htmlContent;
                    container.appendChild(card);
                } catch (e) {
                    console.error("Erro ao processar item do histórico:", e, item);
                }
            });
        }

        // Mostrar botão de sincronização se houver equipas locais e token
        const historicoLocal = JSON.parse(localStorage.getItem("historicoEquipas")) || [];
        if (historicoLocal.length > 0 && token) {
            document.getElementById("syncArea").style.display = "block";
        }

        document.getElementById("syncBtn")?.addEventListener("click", async () => {
            const btn = document.getElementById("syncBtn");
            const msg = document.getElementById("syncMsg");
            btn.disabled = true;
            btn.innerText = "A sincronizar...";
            msg.innerText = "";

            let local = JSON.parse(localStorage.getItem("historicoEquipas")) || [];
            let sucessos = 0;
            let erros = 0;

            for (const item of local) {
                try {
                    const res = await fetch(`${API_URL}/guardar-equipa`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            equipa: JSON.stringify({
                                oponentes: item.oponentes,
                                counters: item.counters,
                                data: item.data
                            })
                        })
                    });
                    if (res.ok) sucessos++;
                    else erros++;
                } catch {
                    erros++;
                }
            }

            if (erros === 0) {
                localStorage.removeItem("historicoEquipas");
                msg.innerText = `${sucessos} equipa(s) sincronizada(s) com sucesso!`;
                document.getElementById("syncArea").style.display = "none";
                location.reload();
            } else {
                msg.innerText = `${sucessos} sincronizada(s), ${erros} falha(s). Tente novamente.`;
                btn.disabled = false;
                btn.innerText = "⬆ Sincronizar equipas locais com o servidor";
            }
        });
    </script>
</body>
</html>
