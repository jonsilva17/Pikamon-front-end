<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pokémon Team Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-banner">For demonstration purposes only</div>

    <div style="text-align: right; padding: 15px; background-color: #f8f9fa; border-bottom: 1px solid #ddd;">
        <span id="userStatus"><a href="login.html" style="text-decoration: none; color: #007bff; font-weight: bold;">Fazer Login / Criar Conta</a></span>
    </div>

    <div class="container">
        <div class="sidebar-pokemon">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu">
            <span>Pikachu AI Mascot</span>
        </div>

        <div class="main-content">
            <h1>Pokémon Counter-Team Builder</h1>
            <p class="subtitle">Powered by Gemini AI</p>
            
            <div class="input-section">
                <label for="opponent-input">Enter Opponent's Pokémon (separated by commas):</label>
                <input type="text" id="opponent-input" placeholder="e.g., Charizard, Gengar, Dragonite">
                <button id="suggest-btn">Get Counter Team</button>
            </div>

            <div id="loading" class="hidden">Thinking of the perfect strategy...</div>
            <div id="error-message" class="hidden"></div>

            <div id="result-section" class="hidden">
                <h2>Your Suggested Counter-Team:</h2>
                <div id="team-container"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. CAPTURAR OS DADOS DO GOOGLE VINDO DA URL (CALLBACK)
        const params = new URLSearchParams(window.location.search);
        const tokenFromUrl = params.get("token");
        const userFromUrl = params.get("user");

        // Se o token e o utilizador vieram na URL, guarda no localStorage
        if (tokenFromUrl && userFromUrl) {
            localStorage.setItem("token", tokenFromUrl);
            localStorage.setItem("utilizadorLogado", userFromUrl);
            
            // Limpa os parâmetros da barra de endereço para segurança e estética
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // 2. VERIFICAR SE O UTILIZADOR ESTÁ LOGADO (Seja via formulário ou via Google)
        const logado = localStorage.getItem("utilizadorLogado");
        if (logado) {
            document.getElementById("userStatus").innerHTML = `Olá, <b>${logado}</b>! | <a href="historico.html" style="color: #007bff; text-decoration: none;">Ver O Meu Histórico</a> | <a href="#" onclick="localStorage.removeItem('token'); localStorage.removeItem('utilizadorLogado'); location.reload();" style="color: red; text-decoration: none; margin-left: 10px;">Sair</a>`;
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
